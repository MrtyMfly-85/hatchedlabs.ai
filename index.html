<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatched Labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 40px 24px;
            gap: 32px;
        }

        .logo-container {
            width: 100%;
            max-width: 420px;
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        .tagline {
            font-size: 15px;
            font-weight: 300;
            color: #999999;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .form-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #c8a44e;
        }

        .input-group input::placeholder {
            color: #555;
        }

        .input-group button {
            width: 100%;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #c8a44e, #a07c2a);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }

        .input-group button:hover {
            opacity: 0.85;
        }

        /* Thank you state */
        .thank-you {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 380px;
            animation: fadeIn 0.5s ease;
        }

        .thank-you h3 {
            font-size: 20px;
            font-weight: 500;
            color: #c8a44e;
            margin-bottom: 10px;
        }

        .thank-you p {
            font-size: 14px;
            font-weight: 300;
            color: #999;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="logo.svg" alt="Hatched Labs">
        </div>

        <p class="tagline">Your AI. Always on. Always yours.</p>

        <div class="form-container" id="formContainer">
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Enter your email" required>
                <button id="submitBtn" onclick="handleSubmit()">Get Early Access</button>
            </div>
        </div>

        <div class="thank-you" id="thankYou">
            <h3>You're on the list!</h3>
            <p>Thanks for your interest. Someone from our team will reach out within 24 hours.</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhwSuw0kc_v8kWhkN2TSjmsqsj9KeL12sMwqOG_BSbBaAkV-MLUeyc2yN6oMfcHjtieg/exec';

        function handleSubmit() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email || !email.includes('@') || !email.includes('.')) {
                document.getElementById('emailInput').style.borderColor = '#ff4444';
                document.getElementById('emailInput').focus();
                return;
            }

            // Disable button while submitting
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Sending...';
            btn.disabled = true;

            // POST to Google Apps Script
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            }).then(() => {
                // Swap form for thank you
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('thankYou').style.display = 'block';
            }).catch(() => {
                // Still show success — no-cors won't give us response status
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('thankYou').style.display = 'block';
            });
        }

        // Allow Enter key
        document.getElementById('emailInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>
</html>
